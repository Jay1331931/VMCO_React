<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <!-- Update viewport meta tag -->
 <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no, shrink-to-fit=no">
 <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Web site created using create-react-app" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>Talab Point</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.
      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.
      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
</body>
<script>
  document.addEventListener('deviceready', function () {
    console.log('Device platform:', device.platform);
    console.log('Device model:', device.model);
    alert('Device platform:', device.platform)
    alert('Device model:', device.model)
  }, false);
</script>
<script>
  // Force safe area on iOS
  if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
    document.addEventListener('DOMContentLoaded', function() {
      // Create meta tag if not exists
      let viewport = document.querySelector('meta[name="viewport"]');
      if (viewport) {
        let content = viewport.getAttribute('content');
        if (!content.includes('viewport-fit=cover')) {
          viewport.setAttribute('content', content + ', viewport-fit=cover');
        }
      }
      
      // Add CSS variables to html element
      document.documentElement.style.setProperty('--safe-area-top', 'env(safe-area-inset-top)');
      document.documentElement.style.setProperty('--safe-area-bottom', 'env(safe-area-inset-bottom)');
      document.documentElement.style.setProperty('--safe-area-left', 'env(safe-area-inset-left)');
      document.documentElement.style.setProperty('--safe-area-right', 'env(safe-area-inset-right)');
      
      // Handle orientation changes
      window.addEventListener('orientationchange', function() {
        setTimeout(function() {
          document.documentElement.style.setProperty('--safe-area-top', 'env(safe-area-inset-top)');
          document.documentElement.style.setProperty('--safe-area-bottom', 'env(safe-area-inset-bottom)');
        }, 100);
      });
    });
  }
</script>
<style>
  /* FIXED SAFE AREA SOLUTION */
  :root {
    /* Define safe area CSS variables */
    --safe-area-top: env(safe-area-inset-top, 0px);
    --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    --safe-area-left: env(safe-area-inset-left, 0px);
    --safe-area-right: env(safe-area-inset-right, 0px);
  }

  html {
    height: 100%;
    width: 100%;
    padding: 0;
    margin: 0;
  }

  body {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    /* Apply safe area padding */
    padding-top: calc(var(--safe-area-top 0) -20px);
    padding-bottom: var(--safe-area-bottom);
    padding-left: var(--safe-area-left);
    padding-right: var(--safe-area-right);
    box-sizing: border-box;
  }

  #root {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    /* Apply safe area again */
    padding-top: var(--safe-area-top);
    padding-bottom: var(--safe-area-bottom);
    padding-left: var(--safe-area-left);
    padding-right: var(--safe-area-right);
    box-sizing: border-box;
  }
  @media (max-width:500px){
     #root {
      padding-top: calc(var(--safe-area-top, 0px) - 1px);
     }
  }
</style>

</html>
