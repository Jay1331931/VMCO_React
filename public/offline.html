<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Lost</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: white; display: flex; align-items: center; justify-content: center;
        }
        .content { text-align: center; }
        .icon-circle {
            width: 70px; height: 70px; border-radius: 50%;
            background-color: #F6921E; display: inline-flex;
            align-items: center; justify-content: center; margin-bottom: 25px;
        }
        .icon-text { color: white; fontSize: 32px; font-weight: bold; font-size: 32px; }
        h1 { font-size: 24px; font-weight: 600; color: #0B4C45; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 25px; font-size: 15px; }
        button {
            background-color: #009345; color: white; border: none;
            padding: 10px 32px; font-size: 15px; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="icon-circle"><span class="icon-text">!</span></div>
            <h1>Connection Lost</h1>
            <p>Unable to connect to the internet</p>
            <!-- <button onclick="window.location.reload()">Try Again</button> -->
        </div>
    </div>
</body>
</html>
